steps:  
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: 
      - '-c'
      - 'docker pull europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop:latest || exit 0'
    id: 'pull-cache'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args: 
      - 'build'
      - '-t'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop:$COMMIT_SHA'
      - '-t'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop:latest'
      - '--cache-from'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    id: 'build'
    waitFor: ['pull-cache']

  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - '--all-tags'
      - 'europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop'
    id: 'push'
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - drop

      - --image=europe-west4-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/drop/drop:$COMMIT_SHA
      - --region=europe-west4
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --allow-unauthenticated
      - --ingress=all
      - --execution-environment=gen1

      - --set-env-vars=TZ=Asia/Yerevan,app_base_url=https://dropdeadisco.com,app_base_url_no_proto=dropdeadisco.com

      - --set-secrets=storage_secret=auth_secret:latest
      - --set-secrets=maps_api_key=maps_api_key:latest
      - --set-secrets=db_conn_string=db-conn-string:latest
      - --set-secrets=telegram_bot_token=telegram_bot_token:latest
      - --set-secrets=telegram_chat_id=telegram_chat_id:latest
      - --set-secrets=vpos_base_url=vpos_base_url:latest
      - --set-secrets=idram_payment_url=idram_payment_url:latest
      - --set-secrets=myameria_base_url=myameria_base_url:latest
      - --set-secrets=myameria_auth_url=myameria_auth_url:latest
      - --set-secrets=myameria_pay_url=myameria_pay_url:latest
      - --set-secrets=apple_apns_key=apple_apns_key:latest
      - --set-secrets=apple_apns_key_id=apple_apns_key_id:latest
      - --set-secrets=apple_pass_cert=apple_pass_cert:latest
      - --set-secrets=apple_pass_key=apple_pass_key:latest
      - --set-secrets=apple_pass_wwdr=apple_pass_wwdr:latest
      - --set-secrets=apple_auth_token=apple_auth_token:latest
      - --set-secrets=apple_team_id=apple_team_id:latest
      - --set-secrets=service_account_credentials=service_account_credentials:latest
      - --set-secrets=vpos_client_id=vpos_client_id:latest
      - --set-secrets=vpos_username=vpos_username:latest
      - --set-secrets=vpos_password=vpos_password:latest
      - --set-secrets=myameria_merchant_id=myameria_merchant_id:latest
      - --set-secrets=myameria_client_id=myameria_client_id:latest
      - --set-secrets=myameria_client_secret=myameria_client_secret:latest
      - --set-secrets=idram_merchant_id=idram_merchant_id:latest
      - --set-secrets=smtp_server=smtp_server:latest
      - --set-secrets=smtp_sender_email=smtp_sender_email:latest
      - --set-secrets=smtp_sender_password=smtp_sender_password:latest
      - --set-secrets=ecrm_base_url=ecrm_base_url:latest
      - --set-secrets=ecrm_crn=ecrm_crn:latest
      - --set-secrets=tin=tin:latest
      - --set-secrets=ecrm_cert_pem=ecrm_cert_pem:latest
      - --set-secrets=ecrm_key_pem=ecrm_key_pem:latest
      - --set-secrets=auth_secret=auth_secret:latest
      - --set-secrets=google_client_id=google_client_id:latest
      - --set-secrets=google_client_secret=google_client_secret:latest
      - --set-secrets=google_drive_creds=google_drive_creds:latest
      - --set-secrets=admins=admins:latest

      - --labels=commit-sha=$COMMIT_SHA,managed-by=gcp-cloud-build-deploy-cloud-run
    id: 'deploy'
    waitFor: ['push']

  - name: 'gcr.io/cloud-builders/gke-deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        MESSAGE="✅ Build completed successfully for commit $COMMIT_SHA"
        
        curl -X POST "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"$${TELEGRAM_CHAT_ID}\", \"text\": \"$${MESSAGE}\", \"parse_mode\": \"HTML\"}"
    id: 'notify-telegram'
    waitFor: ['deploy']
    secretEnv: ['TELEGRAM_BOT_TOKEN', 'TELEGRAM_CHAT_ID']

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/telegram_bot_token/versions/latest
      env: 'TELEGRAM_BOT_TOKEN'
    - versionName: projects/$PROJECT_ID/secrets/telegram_chat_id/versions/latest
      env: 'TELEGRAM_CHAT_ID'