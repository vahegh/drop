<div style="font-family: georgia; max-width: 600px; margin: 0 auto; padding: 10px; line-height: 1.6; font-size: 16px;">
    {% block content %}
    {% endblock %}
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" width="100%" height="40px">
        <tr>
            <td valign="middle" align="center">
                <a href="https://dropdeadisco.com/">
                    <img src="https://storage.googleapis.com/dropdeadisco/images/logo_black.png"
                        alt="Drop Dead Disco Logo" style="display:block;" width="25px">
                </a>
            </td>
            <td valign="middle" align="center">
                <a href="https://instagram.com/dropdeadisco">
                    <img src="https://storage.googleapis.com/dropdeadisco/images/instagram.png" alt="Instagram"
                        style="display:block;" width="25px">
                </a>
            </td>
            <td valign="middle" align="center">
                <a href="https://open.spotify.com/user/4tqtnbljmj15sta3zq3dq6d1v?si=9924a870e02f4add" target="_blank">
                    <img src="https://storage.googleapis.com/dropdeadisco/images/spotify.png" alt="Spotify"
                        style="display:block;" width="25px">
                </a>
            </td>
            <td valign="middle" align="center">
                <a href="https://www.youtube.com/@dropdeadisco" target="_blank">
                    <img src="https://storage.googleapis.com/dropdeadisco/images/youtube.png" alt="Spotify"
                        style="display:block;" width="25px">
                </a>
            </td>
        </tr>
    </table>
</div>
